version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: hacaton-postgres
    environment:
      POSTGRES_DB: hacaton_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      # Bind to loopback only — never expose Postgres to the internet
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
